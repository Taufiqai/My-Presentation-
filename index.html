<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>করবো কাজ গড়বো দেশ · সবার আগে বাংলাদেশ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet" media="all" onerror="this.media='none'">
<style>
  :root{
    --water-deep:#1c5a6e;
    --water:#2f8aa0;
    --water-light:#7fc4cf;
    --sky-1:#cfeef0;
    --sky-2:#a9dfd9;
    --reed:#3f7a3a;
    --reed-deep:#235021;
    --petal:#f3f0f7;
    --petal-edge:#d7c4e8;
    --petal-pink:#e9b8d6;
    --petal-deep:#b483c9;
    --center-gold:#f2c84b;
    --bud-green:#8fc471;
    --bud-pink:#e7a9cf;
    --ink:#16323a;
    --gold:#e0b352;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Hind Siliguri','Noto Sans Bengali','Nirmala UI','Bangla MN','Shonar Bangla','Vrinda','SolaimanLipi','Kalpurush','Siyam Rupali',sans-serif;
    background:linear-gradient(to bottom, #cfeef0 0%, #a9dfd9 22%, #6fb9c0 42%, #3f93a3 64%, #1c5a6e 100%);
    color:var(--ink);overflow-x:hidden;min-height:100vh;position:relative;
  }

  /* distant village silhouette + tree line */
  .scenery{position:fixed;left:0;right:0;top:0;height:46vh;z-index:0;pointer-events:none;}
  .scenery svg{position:absolute;bottom:0;width:100%;height:auto;}
  .sun{position:fixed;top:-90px;right:8%;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,247,214,.95), rgba(255,247,214,0) 64%);
    z-index:0;pointer-events:none;animation:pulse 9s ease-in-out infinite alternate;}
  @keyframes pulse{from{opacity:.7;}to{opacity:1;}}

  /* water surface starts mid-page */
  .water{position:fixed;left:0;right:0;bottom:0;height:62vh;z-index:0;pointer-events:none;
    background:linear-gradient(to bottom, rgba(127,196,207,.55) 0%, rgba(47,138,160,.85) 45%, rgba(28,90,110,.95) 100%);}
  /* ripple lines on water */
  .ripple{position:fixed;left:0;right:0;height:2px;z-index:0;pointer-events:none;
    background:linear-gradient(to right, transparent, rgba(255,255,255,.35), transparent);
    animation:rippleMove 7s ease-in-out infinite alternate;}
  .ripple.r1{bottom:42vh;animation-duration:8s;}
  .ripple.r2{bottom:32vh;opacity:.7;animation-duration:6s;animation-delay:-2s;}
  .ripple.r3{bottom:22vh;opacity:.5;animation-duration:9s;animation-delay:-4s;}
  .ripple.r4{bottom:13vh;opacity:.4;animation-duration:7s;animation-delay:-1s;}
  @keyframes rippleMove{from{transform:translateX(-3%) scaleX(.98);}to{transform:translateX(3%) scaleX(1.02);}}

  .wrap{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:50px 22px 40px;min-height:100vh;display:flex;flex-direction:column;}

  header{text-align:center;margin-bottom:6px;}
  h1{
    font-family:'Tiro Bangla','Noto Serif Bengali','Vrinda','Nirmala UI','Bangla MN','Shonar Bangla','SolaimanLipi','Kalpurush',serif;font-weight:400;
    font-size:clamp(1.9rem,5.4vw,3.4rem);line-height:1.2;color:#0c3540;
    text-shadow:0 1px 0 rgba(255,255,255,.5);
  }

  .stage{position:relative;height:640px;margin-top:10px;flex:0 0 auto;}
  @media(max-width:640px){.stage{height:560px;}}

  /* floating lily pads behind flowers */
  .pad{position:absolute;z-index:1;pointer-events:none;animation:bob 7s ease-in-out infinite;}
  .pad.p2{animation-delay:-2.5s;animation-duration:8s;}
  .pad.p3{animation-delay:-4s;animation-duration:6.5s;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(var(--pr,0deg));}50%{transform:translateY(-7px) rotate(calc(var(--pr,0deg) + 2deg));}}

  .sprig{position:absolute;cursor:pointer;transform-origin:50% 70%;
    transition:transform .25s ease, filter .25s ease;will-change:transform;}
  .sprig:focus{outline:none;}
  .sprig:focus-visible .bloom{
    filter:drop-shadow(0 0 0 3px var(--gold)) drop-shadow(0 4px 10px rgba(0,0,0,.3));}
  .sprig:hover{filter:drop-shadow(0 12px 20px rgba(0,0,0,.28));}

  /* gentle floating idle */
  @keyframes floatlily{0%,100%{transform:translateY(0) rotate(var(--rest,0deg));}50%{transform:translateY(-9px) rotate(calc(var(--rest,0deg) + 2.5deg));}}
  .sprig.alive{animation:floatlily 6s ease-in-out infinite;}
  .sprig.s2{animation-delay:-1.8s;animation-duration:6.8s;}
  .sprig.bud{animation-delay:-3.2s;animation-duration:7.4s;}

  /* fall = petals drift down onto/into the water and float away */
  @keyframes fall{
    0%{transform:translate(0,0) rotate(var(--rest,0deg));opacity:1;}
    20%{transform:translate(var(--fx1,-10px),14px) rotate(12deg);}
    55%{transform:translate(var(--fx2,40px),150px) rotate(-90deg);opacity:1;}
    100%{transform:translate(var(--fx3,-30px),360px) rotate(200deg);opacity:0;}
  }
  .sprig.falling{animation:fall 2.1s cubic-bezier(.45,.05,.55,.95) forwards;pointer-events:none;}
  .bloom{display:block;}

  .toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(40px);
    background:rgba(12,53,64,.95);color:#eafaf7;padding:13px 20px;border-radius:13px;
    font-size:.9rem;box-shadow:0 14px 40px rgba(0,0,0,.35);z-index:50;opacity:0;
    transition:opacity .3s ease, transform .3s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast a{color:#bdebe3;font-weight:600;text-decoration:underline;}

  .spacer{flex:1 1 auto;}
  .credit{
    align-self:flex-end;text-align:right;max-width:680px;
    font-size:.92rem;line-height:1.65;color:#0c3540;font-weight:500;
    background:rgba(255,255,255,.66);backdrop-filter:blur(5px);
    border:1px solid rgba(28,90,110,.22);border-radius:14px;padding:14px 20px;
    box-shadow:0 10px 26px rgba(12,53,64,.14);
  }
  .credit b{font-weight:700;}

  @media(prefers-reduced-motion:reduce){
    .sprig.alive,.pad,.ripple,.sun{animation:none;}
    .sprig.falling{animation:fade .5s forwards;}
    @keyframes fade{to{opacity:0;transform:translateY(40px);}}
  }
</style>
</head>

  <div class="sun"></div>
  <!-- distant rural scenery: tree line + huts -->
  <div class="scenery">
    <svg viewBox="0 0 1440 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

               C380,96 430,100 470,150 C500,118 540,120 580,150 L1440,150 L1440,220 L0,220 Z" fill="#2f6e3e" opacity=".55"/>
      <path d="M700,150 C730,110 780,116 810,150 C840,100 890,104 930,150 C960,112 1010,116 1050,150
               C1090,98 1140,104 1180,150 C1220,116 1280,120 1330,150 L1440,150 L1440,220 L0,220 Z" fill="#27602f" opacity=".5"/>

  <div class="wrap">
    <header>

    <div class="spacer"></div>

  const names = {
    leaf1: "\u09a6\u09aa\u09cd\u09a4\u09b0\u09c7\u09b0 \u0995\u09b0\u09cd\u09ae\u09aa\u09b0\u09bf\u0995\u09b2\u09cd\u09aa\u09a8\u09be",
    leaf2: "National Delivery Portal",
    bud:   "BCSKR \u2014 Knowledge Repository"
  };
  const toast = document.getElementById('toast');
  let toastTimer;
  function showToast(id, url){
    clearTimeout(toastTimer);
    toast.innerHTML = '\u{1FAB7} \u0996\u09c1\u09b2\u099b\u09c7 \u2014 <a href="'+url+'" target="_blank" rel="noopener">'+names[id]+'</a>';
    toast.classList.add('show');
    toastTimer = setTimeout(()=>toast.classList.remove('show'), 4200);
  }
  function dropAndOpen(el){
    const id = el.id;
    if(el.classList.contains('falling')) return;
    el.classList.remove('alive');
    el.classList.add('falling');
    showToast(id, links[id]);
    setTimeout(()=>{ window.open(links[id], '_blank', 'noopener'); }, 650);
    setTimeout(()=>{
      el.classList.remove('falling');
      el.style.opacity='';
      void el.offsetWidth;
      el.classList.add('alive');
    }, 3300);
  }
  document.querySelectorAll('.sprig').forEach(el=>{
    let hoverGuard=false;
    el.addEventListener('mouseenter', ()=>{
      if(hoverGuard) return; hoverGuard=true;
      setTimeout(()=>hoverGuard=false, 3600);
      dropAndOpen(el);
    });
    el.addEventListener('click', ()=>dropAndOpen(el));
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();dropAndOpen(el);} });
    el.addEventListener('touchstart', e=>{ e.preventDefault(); dropAndOpen(el); }, {passive:false});
  });
